name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # 1. TEST THE CODE
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Build Test
        run: npm run build

  # 2. BUILD & PUSH DOCKER IMAGE
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/johnp2003/portofilo:latest

  # 3. DEPLOY TO VPS
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Ensure directory exists and code is updated
            mkdir -p /opt/portfolio
            cd /opt/portfolio
            if [ -d ".git" ]; then 
              git remote set-url origin https://${{ secrets.GHCR_PAT }}@github.com/johnp2003/portofilo.git
              git pull origin main
            else 
              git clone https://${{ secrets.GHCR_PAT }}@github.com/johnp2003/portofilo.git .
            fi
            
            # Login to GHCR on the VPS so it is allowed to download the image
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u johnp2003 --password-stdin
            
            # Pull the new image and seamlessly restart
            docker compose pull
            docker compose up -d
